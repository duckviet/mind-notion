name: Deploy AI Services to Heroku

on:
  push:
    branches: ["master"]
    paths:
      - "ai-services/**" # Chi chay khi co thay doi trong folder nay

jobs:
  build:
    runs-on: ubuntu-latest
    environment: secrets
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Heroku Container Registry
        run: echo "$HEROKU_API_KEY" | docker login --username=_ --password-stdin registry.heroku.com
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY_AI_SERVICE }}

      - name: Build and Push Docker Image
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY_AI_SERVICE }}
          APP_NAME: ${{ secrets.HEROKU_APP_NAME_AI_SERVICE }}
        run: |
          # Build image tu folder ai-services
          docker build -t registry.heroku.com/$APP_NAME/web ./ai-services
          # Push len Heroku registry
          docker push registry.heroku.com/$APP_NAME/web

      - name: Release App
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY_AI_SERVICE }}
          APP_NAME: ${{ secrets.HEROKU_APP_NAME_AI_SERVICE }}
        run: |
          # Dung Heroku CLI de release
          npm install -g heroku
          heroku container:release web --app $APP_NAME
