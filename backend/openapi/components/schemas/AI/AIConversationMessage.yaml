type: object
required:
  - id
  - conversation_id
  - run_id
  - role
  - content
  - created_at
properties:
  id:
    type: string
  conversation_id:
    type: string
  run_id:
    type: string
  role:
    type: string
    enum:
      - user
      - assistant
  content:
    type: string
  metadata:
    type: object
    additionalProperties: true
  created_at:
    type: string
    format: date-time
