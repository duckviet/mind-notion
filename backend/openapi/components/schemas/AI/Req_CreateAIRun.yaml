type: object
properties:
  workspace_id:
    type: string
    example: "workspace-123"
  session_id:
    type: string
    example: "session-123"
  note_id:
    type: string
    example: "note-123"
  message:
    type: object
    properties:
      role:
        type: string
        enum: [user]
        example: user
      content:
        type: string
        example: "Hãy tóm tắt ghi chú này"
    required: [content]
required: [workspace_id, session_id, note_id, message]
