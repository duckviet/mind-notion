type: object
required:
  - workspace_id
  - session_id
  - message
properties:
  workspace_id:
    type: string
    example: "workspace-123"
  session_id:
    type: string
    example: "session-123"
  note_id:
    type: string
    example: "note-123"
  folder_id:
    type: string
    example: "folder-123"
  conversation_id:
    type: string
    example: "8f84f155-5a42-4d63-9ba3-c3f6f750f04f"
  display_user_message:
    type: string
    example: "Summarize this note"
  message:
    type: object
    required:
      - content
    properties:
      role:
        type: string
        example: "user"
      content:
        type: string
        example: "Summarize this note"
