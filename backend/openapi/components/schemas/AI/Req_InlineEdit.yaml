type: object
properties:
  workspace_id:
    type: string
    example: "workspace-123"
  note_id:
    type: string
    example: "note-123"
  action:
    type: string
    example: "improve"
  selected_text:
    type: string
    example: "this is a draft sentence"
  custom_prompt:
    type: string
    example: "make this more concise"
  context_blocks:
    type: array
    items:
      type: object
      additionalProperties: true
required: [workspace_id, action, selected_text]
