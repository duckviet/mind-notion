post:
  summary: Reorder folders by parent
  operationId: reorderFolders
  tags: [Folder]
  security:
    - BearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/Folder/Req_ReorderFolders.yaml
  responses:
    "200":
      description: Folders reordered successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              ok:
                type: boolean
                example: true
              parent_id:
                type: string
                example: ""
              folder_ids:
                type: array
                items:
                  type: string
            required: [ok, parent_id, folder_ids]
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "500":
      $ref: ../../components/responses/InternalServerError.yaml
