post:
  summary: Inline edit selected text with AI
  operationId: inlineEditAi
  tags: [AI]
  security:
    - BearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/AI/Req_InlineEdit.yaml
  responses:
    "200":
      description: Inline edit generated
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/AI/Res_InlineEdit.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "404":
      $ref: ../../components/responses/NotFound.yaml
    "500":
      $ref: ../../components/responses/InternalServerError.yaml
