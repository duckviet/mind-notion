services:
  app:
    image: golang:1.22-alpine
    ports:
      - "8080:8080"
    environment:
      - ENV=development
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5433
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=password
      - DATABASE_NAME=collaborative_editor
      - REDIS_HOST=redis
      - REDIS_PORT=6380
      - AI_SERVICE_URL=http://ai-service:8090
      - AI_SERVICE_TOKEN=dev-ai-service-token
      - AI_REQUEST_TIMEOUT_MS=30000
    depends_on:
      - postgres
      - redis
      - ai-service
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "go mod download && go install github.com/cosmtrek/air@latest && air"

  ai-service:
    image: python:3.11-slim
    ports:
      - "8090:8090"
    environment:
      - AI_SERVICE_HOST=0.0.0.0
      - AI_SERVICE_PORT=8090
      - AI_INTERNAL_TOKEN=dev-ai-service-token
      - BACKEND_INTERNAL_BASE_URL=http://app:8080
      - BACKEND_INTERNAL_TOKEN=dev-ai-service-token
      - BACKEND_TOOL_TIMEOUT_MS=30000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ../ai-services/agent-py:/app
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python main.py"

  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: collaborative_editor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
